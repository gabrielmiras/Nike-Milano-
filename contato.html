<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="pasta.img/nikeshoes.png">
    <title>Prada Milano.com</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css/contato.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="pasta.img/nike.png" alt="" width="60px" style="filter: brightness(2);"> 
                <span class="ms-2">Nike Milano</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="Productlist.html">Product list</a></li>
                    <li class="nav-item"><a class="nav-link" href="Aboutus.html">About us</a></li>
                    <li class="nav-item"><a class="nav-link active" href="contato.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <h3 class="mb-4 text-uppercase border-bottom pb-2">Cadastro de Produto</h3>
                
                <form class="row g-3">
                    <div class="col-md-8 col-sm-12">
                        <div class="form-floating">
                            <input type="text" name="nome_prod" id="nome_prod" class="form-control" placeholder="Ex: Nike Air Max" required>
                            <label for="nome_prod">Nome do Produto</label>
                        </div>
                    </div>

                    <div class="col-md-4 col-sm-12">
                        <div class="form-floating">
                            <input type="number" name="valor" id="valor" class="form-control" placeholder="0.00" step="0.5" min="0" required>
                            <label for="valor">Valor (R$)</label>
                        </div>
                    </div>

                    <div class="col-md-6 col-sm-12">
                        <div class="form-floating">
                            <input type="number" name="quantidade" id="quantidade" class="form-control" placeholder="0" min="0" required>
                            <label for="quantidade">Quantidade</label>
                        </div>
                    </div>

                    <div class="col-md-6 col-sm-12">
                        <div class="form-floating">
                            <select name="categoria" id="categoria" class="form-select" required>
                                <option value="" selected disabled>Selecione</option>
                                <option value="calcados">Calçados</option>
                                <option value="vestuario">Vestuário</option>
                                <option value="acessorios">Acessórios</option>
                            </select>
                            <label for="categoria">Categoria</label>
                        </div>
                    </div>

                    <div class="col-12 mt-3">
                        <label class="form-label d-block fw-bold">Fabricado em:</label>
                        <div class="form-check form-check-inline">
                            <input type="radio" name="origem" id="sp" value="sp" class="form-check-input" checked>
                            <label for="sp" class="form-check-label">São Paulo (SP)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" name="origem" id="rj" value="rj" class="form-check-input">
                            <label for="rj" class="form-check-label">Rio de Janeiro (RJ)</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input type="radio" name="origem" id="mg" value="mg" class="form-check-input">
                            <label for="mg" class="form-check-label">Minas Gerais (MG)</label>
                        </div>
                    </div>

                    <div class="col-12 mt-4">
                        <button type="submit" class="btn btn-success px-4">Cadastrar</button>
                        <button type="reset" class="btn btn-outline-danger">Limpar</button>
                        <a href="index.html" class="btn btn-dark">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Nike, Inc. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
