<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Nike Milano | Member Access</title>
    <link rel="stylesheet" href="/Style.css/login.css">
</head>

<body>

    <nav class="nav-container">
        <div class="nav-logo">
            <a href="index.html">
                <img src="pasta.img/nike.png" alt="Nike">
            </a>
        </div>
        <ul class="nav-menu">
            <li onclick="movePrism('front')">Login</li>
            <li onclick="movePrism('right')">Join Us</li>
            <li onclick="movePrism('back')">Reset</li>
            <li onclick="movePrism('left')">Support</li>
        </ul>
    </nav>

    <div class="wrapper">
        <div class="rec-prism" id="prism">
            <div class="face face-front">
                <div class="content">
                    <h2 class="nike-title">YOUR ACCOUNT FOR EVERYTHING NIKE</h2>
                    <form onsubmit="event.preventDefault(); showSuccess();">
                        <div class="field-wrapper">
                            <input type="email" required placeholder=" ">
                            <label>Email address</label>
                        </div>
                        <div class="field-wrapper">
                            <input type="password" required placeholder=" ">
                            <label>Password</label>
                        </div>
                        <button type="submit" class="btn-nike">SIGN IN</button>
                    </form>
                    <p class="footer-text">Not a Member? <span onclick="movePrism('right')"
                            style="text-decoration: underline; cursor: pointer;">Join us.</span></p>
                </div>
            </div>

            <div class="face face-right">
                <div class="content">
                    <h2 class="nike-title">BECOME A NIKE MEMBER</h2>
                    <form onsubmit="event.preventDefault(); showSuccess();">
                        <div class="field-wrapper">
                            <input type="text" required placeholder=" ">
                            <label>First Name</label>
                        </div>
                        <div class="field-wrapper">
                            <input type="email" required placeholder=" ">
                            <label>Email address</label>
                        </div>
                        <div class="field-wrapper">
                            <input type="password" required placeholder=" ">
                            <label>Password</label>
                        </div>
                        <button type="submit" class="btn-nike">JOIN US</button>
                    </form>
                </div>
            </div>

            <div class="face face-back">
                <div class="content">
                    <h2 class="nike-title">RESET PASSWORD</h2>
                    <p class="small-info">Enter your email to receive instructions.</p>
                    <form onsubmit="event.preventDefault(); showSuccess();">
                        <div class="field-wrapper">
                            <input type="email" required placeholder=" ">
                            <label>Email address</label>
                        </div>
                        <button type="submit" class="btn-nike">SEND EMAIL</button>
                    </form>
                </div>
            </div>

            <div class="face face-left">
                <div class="content">
                    <h2 class="nike-title">NIKE MILANO SUPPORT</h2>
                    <form onsubmit="event.preventDefault(); showSuccess();">
                        <div class="field-wrapper">
                            <textarea required placeholder=" "></textarea>
                            <label>Message</label>
                        </div>
                        <button type="submit" class="btn-nike">SEND MESSAGE</button>
                    </form>
                </div>
            </div>

            <div class="face face-bottom">
                <div class="content success-screen">
                    <div class="nike-check">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_NIKE.svg" width="80"
                            style="filter: brightness(0) invert(1);">
                    </div>
                    <h2 class="nike-title">DONE.</h2>
                    <p>Check your inbox for the next steps.</p>
                    <button class="btn-outline" onclick="movePrism('front')">GO BACK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="tentando script/tentandologin.js"></script>
</body>

</html>
